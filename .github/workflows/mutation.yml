name: Mutation Testing

# Weekly mutation-testing job (#204). Mutates math-heavy modules and
# re-runs the unit suite to find tests that exercise the line but
# don't actually catch a bug. Survival rate is the inverse of test
# effectiveness on those modules.
#
# NOT a PR gate: runs are slow (≥ 30 min for the configured paths),
# the survival rate isn't a hard pass/fail, and the right cadence is
# weekly review, not per-PR. The HTML report is uploaded as an
# artifact for inspection.

on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays at 06:00 UTC
  workflow_dispatch:      # allow manual runs from the Actions tab

permissions:
  contents: read

jobs:
  mutate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mutation-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-mutation-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # Verify the unit AND e2e suites are green before we start
      # mutating — a pre-existing failure would make every mutant
      # "killed" by that same failure, polluting the survival
      # statistics. e2e is included because #223 added e2e chain
      # modules to the mutation surface.
      - name: Smoke test (unit + e2e must be green)
        run: pytest tests/ -m "not integration" -q --tb=line

      - name: Run mutmut
        # mutmut returns non-zero when there are surviving mutants —
        # which is information, not a CI failure on this advisory job.
        # Path / runner config lives in setup.cfg [mutmut]; the CLI
        # flags here are kept in sync with that file so a manual
        # ``workflow_dispatch`` run uses the same surface.
        continue-on-error: true
        run: |
          mutmut run \
            --paths-to-mutate "risk/,analysis/,strategies/indicators.py,broker/paper_trader.py,journal/trading_journal.py,bus/event_bus.py,audit/" \
            --tests-dir tests/ \
            --runner 'python -m pytest -x -q -m "not integration" --no-header --tb=no' \
            --use-coverage

      - name: Generate HTML report
        if: always()
        run: |
          mutmut html || true
          mutmut results > mutation-summary.txt 2>&1 || true

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: |
            html/
            mutation-summary.txt
            .mutmut-cache

      - name: Print survival summary
        if: always()
        run: |
          echo "::group::mutmut results"
          cat mutation-summary.txt || echo "no summary produced"
          echo "::endgroup::"
