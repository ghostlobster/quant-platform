name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install ruff
      - run: ruff check .

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install bandit pip-audit
      - name: Bandit static analysis
        run: bandit -r . -ll --exclude ./.git,./tests -f json -o bandit-report.json || true
      - name: Check bandit results
        run: python -c "import json,sys; r=json.load(open('bandit-report.json')); highs=[i for i in r['results'] if i['issue_severity']=='HIGH']; print(f'{len(highs)} HIGH severity issues'); sys.exit(1 if highs else 0)"
      - name: pip-audit
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969 || true
      - uses: actions/upload-artifact@v4
        with: { name: bandit-report, path: bandit-report.json }

  test:
    name: Test (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # full history needed by scripts/check_changed_module_coverage.py
        # (#215 excellent-test gate) so it can `git diff origin/main...HEAD`.
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      # Unit tests — excludes integration AND e2e so the unit feedback
      # loop stays tight. The e2e suite runs in parallel via the `e2e`
      # job below; integration runs on demand once tests are added.
      #
      # Coverage uses branch coverage (#200) configured in .coveragerc.
      # The 76 % floor is now line + branch combined, so it's strictly
      # more rigorous than the historical line-only floor.
      - name: Run unit tests
        continue-on-error: false
        run: |
          pytest tests/ -v -m "not integration and not e2e" \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=76 \
            --junitxml=test-results-unit.xml

      # Silent-skip guard (#199) — fails the job if any test was skipped
      # because a package pinned in requirements.txt failed to import.
      # Catches the regression where a removed pin or broken wheel lowers
      # coverage with no failing test.
      - name: Detect silent skips from missing required deps
        run: python scripts/check_no_silent_skips.py test-results-unit.xml requirements.txt

      # Excellent-test gate (#215) — every Python source file the PR
      # added/modified must have ≥ CHANGED_MODULE_MIN_PCT (default 85%)
      # combined coverage. The global 76% floor catches project-average
      # drift; this catches per-PR drift at the file the contributor
      # just touched. Skipped on push-to-main since the gate compares
      # HEAD vs origin/main and there's nothing to diff.
      - name: Excellent-test gate (changed-module coverage)
        if: github.event_name == 'pull_request'
        env:
          CHANGED_MODULE_MIN_PCT: "85"
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          python scripts/check_changed_module_coverage.py coverage.xml origin/${{ github.base_ref }}

      # Integration tests — runs tests marked @pytest.mark.integration
      # Currently 0 tests are marked; this step scaffolds the split for future use.
      # Exit code 5 means "no tests collected", which is expected until integration
      # tests are added — treat it as success.
      - name: Run integration tests
        continue-on-error: false
        run: |
          pytest tests/ -v -m "integration" \
            --cov=. \
            --cov-report=xml:coverage-integration.xml \
            --cov-append \
            --junitxml=test-results-integration.xml \
          || [ $? -eq 5 ]

      - name: Upload coverage and test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage-integration.xml
            test-results-unit.xml
            test-results-integration.xml

      - name: Post coverage summary comment
        uses: MishaKav/pytest-coverage-comment@main
        if: github.event_name == 'pull_request'
        with:
          pytest-xml-coverage-path: ./coverage.xml
          junitxml-path: ./test-results-unit.xml
          title: "Coverage Report (unit)"
          badge-title: "Unit Coverage"
          hide-badge: false
          hide-report: false
          create-new-comment: false
          hide-comment: false
          report-only-changed-files: false
          unique-id-for-comment: unit-coverage

  e2e:
    name: E2E (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      # End-to-end suite — exercises the broker ↔ guard ↔ journal ↔
      # scheduler ↔ cache chain on a real SQLite + paper trader. Network
      # boundaries (Polygon, MLflow, alert channels) are mocked at the
      # adapter; nothing else is.
      #
      # Coverage is reported globally for visibility but the merge gate
      # is the per-module coverage floor below — the e2e suite must
      # touch every cross-module file it claims to exercise. The unit
      # job owns the global 76% floor; this job's job is "did the
      # chain break?" plus "is every chain still wired up?"
      - name: Run end-to-end tests
        continue-on-error: false
        run: |
          pytest tests/ -v -m "e2e" \
            --cov=. \
            --cov-report=xml:coverage-e2e.xml \
            --cov-report=term \
            --junitxml=test-results-e2e.xml

      # Per-module coverage floor — every Phase-1 cross-module file the
      # e2e suite is supposed to exercise must show ≥ E2E_MIN_PER_MODULE
      # line coverage. Catches the failure mode where an e2e test silently
      # stops touching a module (e.g. someone removes a chain step).
      - name: Enforce e2e per-module coverage floor
        run: |
          python scripts/check_e2e_coverage.py coverage-e2e.xml
        env:
          E2E_MIN_PER_MODULE: "40"

      - name: Upload e2e coverage and test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: |
            coverage-e2e.xml
            test-results-e2e.xml

      - name: Post e2e summary comment
        uses: MishaKav/pytest-coverage-comment@main
        if: github.event_name == 'pull_request'
        with:
          pytest-xml-coverage-path: ./coverage-e2e.xml
          junitxml-path: ./test-results-e2e.xml
          title: "E2E Report"
          badge-title: "E2E Tests"
          hide-badge: false
          hide-report: false
          create-new-comment: false
          hide-comment: false
          report-only-changed-files: false
          unique-id-for-comment: e2e-report

  # Single required check for branch protection — depends on every other
  # job and inherits their pass/fail. Update branch protection on `main`
  # to require ONLY this check; it will transitively gate lint, security,
  # unit tests, and e2e together.
  #
  # `if: always()` ensures the gate runs even when an upstream job fails;
  # the script then explicitly fails the gate if any need is in 'failure'
  # or 'cancelled' state.
  merge-gate:
    name: Merge gate
    runs-on: ubuntu-latest
    needs: [lint, security, test, e2e]
    if: always()
    steps:
      - name: Verify all upstream jobs succeeded
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          python - <<'PY'
          import json, os, sys
          needs = json.loads(os.environ["NEEDS_JSON"])
          failures = [name for name, info in needs.items()
                      if info.get("result") not in ("success", "skipped")]
          if failures:
              print(f"::error::Merge gate failed — upstream jobs not green: {failures}")
              for name, info in needs.items():
                  print(f"  {name:<10s} -> {info.get('result')}")
              sys.exit(1)
          print("All upstream jobs green:")
          for name, info in needs.items():
              print(f"  {name:<10s} -> {info.get('result')}")
          PY
