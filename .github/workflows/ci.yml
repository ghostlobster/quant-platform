name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install ruff
      - run: ruff check .

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install bandit pip-audit
      - name: Bandit static analysis
        run: bandit -r . -ll --exclude ./.git,./tests -f json -o bandit-report.json || true
      - name: Check bandit results
        run: python -c "import json,sys; r=json.load(open('bandit-report.json')); highs=[i for i in r['results'] if i['issue_severity']=='HIGH']; print(f'{len(highs)} HIGH severity issues'); sys.exit(1 if highs else 0)"
      - name: pip-audit
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969 || true
      - uses: actions/upload-artifact@v4
        with: { name: bandit-report, path: bandit-report.json }

  test:
    name: Test (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      # Unit tests — excludes anything marked @pytest.mark.integration
      - name: Run unit tests
        continue-on-error: false
        run: |
          pytest tests/ -v -m "not integration" \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=76 \
            --junitxml=test-results-unit.xml

      # Integration tests — runs tests marked @pytest.mark.integration
      # Currently 0 tests are marked; this step scaffolds the split for future use.
      - name: Run integration tests
        continue-on-error: false
        run: |
          pytest tests/ -v -m "integration" \
            --cov=. \
            --cov-report=xml:coverage-integration.xml \
            --cov-append \
            --junitxml=test-results-integration.xml

      - name: Upload coverage and test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage-integration.xml
            test-results-unit.xml
            test-results-integration.xml

      - name: Post coverage summary comment
        uses: MishaKav/pytest-coverage-comment@main
        if: github.event_name == 'pull_request'
        with:
          pytest-xml-coverage-path: ./coverage.xml
          junitxml-path: ./test-results-unit.xml
          title: "Coverage Report"
          badge-title: "Coverage"
          hide-badge: false
          hide-report: false
          create-new-comment: false
          hide-comment: false
          report-only-changed-files: false
